{{- if eq .Values.app.mode "dashboard" }}

# Impersonation ClusterRole for OIDC authentication.
# Allows the dashboard's API and Web service accounts to impersonate
# OIDC-authenticated users. This avoids needing to configure the
# Kubernetes API server for OIDC.
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  labels:
    {{- include "kubernetes-dashboard.labels" . | nindent 4 }}
  annotations:
    {{- include "kubernetes-dashboard.annotations" . | nindent 4 }}
  name: {{ template "kubernetes-dashboard.fullname" . }}-impersonator
rules:
  - apiGroups: [""]
    resources: ["users", "groups", "serviceaccounts"]
    verbs: ["impersonate"]

---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  labels:
    {{- include "kubernetes-dashboard.labels" . | nindent 4 }}
  annotations:
    {{- include "kubernetes-dashboard.annotations" . | nindent 4 }}
  name: {{ template "kubernetes-dashboard.fullname" . }}-impersonator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ template "kubernetes-dashboard.fullname" . }}-impersonator
subjects:
  - kind: ServiceAccount
    name: {{ template "kubernetes-dashboard.fullname" . }}-{{ .Values.api.role }}
    namespace: {{ .Release.Namespace }}
  - kind: ServiceAccount
    name: {{ template "kubernetes-dashboard.fullname" . }}-{{ .Values.web.role }}
    namespace: {{ .Release.Namespace }}

{{- end }}
